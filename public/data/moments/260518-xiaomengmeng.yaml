  不知不觉头北薯芙噗皮雨也陪咱好久了（指用了好多年表情包）。说起来 19 年之前还没频繁用猫咪表情包的时候，我喜欢偷群友的二次元表情包图（白圣女啊，etc.）。在贯彻猫郎/猫娘设定之前也有人说我可爱。…哈。

  但可爱久了也就成了惯性。这不我 Ag 的设定本来是“涩气”的，但说话方式改不过来（或者说涩不起来），愣是改成了猫娘为主，魅魔尾巴为点缀。只能说没有办法。

  好在我的（网络）朋友们似乎还挺喜欢我这样的。好耶。
