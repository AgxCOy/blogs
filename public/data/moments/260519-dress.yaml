  女装的风潮最早应是在 2018 年的 B 站，当年有个很火的 up 主叫沙拉。然后一时间我的关注列表里也有 up 主开始投稿自己的“另类”穿搭。也是差不多那个时候我的视频评论区里有人问我“什么时候女装”。当时我给出了肯定的承诺，但直到那个账号注销我都没发过女装。不如说一直没条件去蹭这个热度吧。

  我女装的契机是好奇：女孩子群友之间讨论裤袜的场面还是太有想象空间了（对不起）。但真正叩开 cross dressing 的大门后，我之所见却也没那些“穿搭博主”展示的那么“美”。以前还笼统地叫做女装子，后来西方政治需要分化成了 mtf、男娘、药娘等等更小的团体。如今“小团体”这个词是个贬义词，而这些“小团体”也的确并不总是展示出积极的形象。

  所以我想，我就止步于“女装子”就好。只是普普通通地套上女装、普普通通地摆拍几副图。反正也没人看。反正也不好看。
