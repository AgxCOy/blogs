  女装的风潮最早应是在 2018 年的 B 站，当年有个很火的 up 主叫沙拉。然后一时间我的关注列表里也有 up 主开始投稿自己的 cross dressing 穿搭。也是差不多那个时候我的视频评论区里有人问我“什么时候女装”。
  当时我给出了肯定的承诺，但直到那个账号注销我都没发过女装。不如说一直没条件去蹭这个热度吧。

  最开始尝试其实是大一。群里有女孩子在聊丝袜，我按捺不住好奇偷摸买了条裤袜在家穿。实话说，还蛮舒服（）然后就一发不可收拾地尝试各种裤袜。
  但过膝袜就怎么也穿不了，毕竟太肥了（

  时间来到 25 年初，也就是那张刻晴裤袜腿的摆拍。这时候我减肥的成果逐渐消退（在哥哥那里寄居吃的稍微多一点，运动了也消耗不完），正好我在淘宝上刷到这条裤袜，就买下来穿一下试试。这张也就算是我正式的第一张女装图（非正式的在我大学同学那（）。

  在反反复复的减肥尝试后，我在 25 年夏发了几张白丝，最终在当年最后一天完整地拍了组女仆装，也算是给当年的承诺一个交代吧。虽然当年评论的 Ta 大概是看不到了。